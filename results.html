<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GRID CHAOS — RACE RESULTS</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet"/>
  <style>
    :root { --red:#ff2b2b; --yellow:#ffe600; --green:#00ff6a; --white:#f5f5f5; --black:#0a0a0a; --grey:#1a1a1a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--black); color:var(--white); font-family:'VT323',monospace; font-size:20px; min-height:100vh; }
    body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px); pointer-events:none; z-index:999; }
    header { text-align:center; padding:30px 20px 20px; border-bottom:4px solid var(--red); }
    header h1 { font-family:'Press Start 2P',monospace; font-size:clamp(14px,3vw,26px); color:var(--red); text-shadow:4px 4px 0 var(--yellow); }
    .subtitle { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--yellow); margin-top:10px; }
    .nav-links { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; padding:20px; }
    .nav-link { font-family:'Press Start 2P',monospace; font-size:9px; padding:10px 16px; background:var(--grey); color:var(--yellow); text-decoration:none; border:3px solid var(--yellow); }
    .nav-link:hover { background:var(--yellow); color:var(--black); }
    .content { max-width:800px; margin:0 auto; padding:30px 20px; }
    .no-results { text-align:center; padding:60px 20px; }
    .no-results p { font-family:'Press Start 2P',monospace; font-size:12px; color:#444; line-height:2; }
    .race-block { background:var(--grey); margin-bottom:32px; border-top:4px solid var(--red); }
    .race-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; background:#000; border-bottom:3px solid #222; flex-wrap:wrap; gap:8px; }
    .race-title { font-family:'Press Start 2P',monospace; font-size:12px; color:var(--yellow); }
    .race-date { font-size:18px; color:#666; }
    .result-row { display:flex; align-items:center; gap:12px; padding:10px 20px; border-bottom:2px solid #222; }
    .result-row:last-child { border-bottom:none; }
    .result-row.top1 { background:rgba(255,230,0,0.08); }
    .result-row.top2 { background:rgba(170,170,170,0.05); }
    .result-row.top3 { background:rgba(205,127,50,0.05); }
    .pos { font-family:'Press Start 2P',monospace; font-size:11px; width:40px; flex-shrink:0; }
    .top1 .pos { color:var(--yellow); }
    .top2 .pos { color:#aaa; }
    .top3 .pos { color:#cd7f32; }
    .medal { font-size:22px; width:28px; flex-shrink:0; }
    .driver-info { flex:1; }
    .driver-ig { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--white); }
    .driver-num { font-size:17px; color:#666; }
    .pts-badge { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--yellow); background:#000; padding:4px 8px; }
    .section-title { font-family:'Press Start 2P',monospace; font-size:clamp(12px,2.5vw,20px); color:var(--yellow); text-align:center; margin-bottom:30px; }
    .section-title::after { content:''; display:block; width:60px; height:4px; background:var(--red); margin:12px auto 0; }
  </style>
</head>
<body>
<header>
  <h1>📋 RACE RESULTS</h1>
  <p class="subtitle">GRID CHAOS — SEASON 1</p>
</header>
<div class="nav-links">
  <a href="standings.html" class="nav-link">🏆 STANDINGS</a>
  <a href="index.html" class="nav-link">🏠 HOME</a>
</div>
<div class="content">
  <h2 class="section-title">// ALL RACE RESULTS</h2>
  <div id="resultsContainer"></div>
</div>
<script>
  const medals = ['🥇','🥈','🥉'];
  const topClasses = ['top1','top2','top3'];

  function loadResults() {
    const results = JSON.parse(localStorage.getItem('gc_results') || '[]');
    const container = document.getElementById('resultsContainer');

    if (results.length === 0) {
      container.innerHTML = `<div class="no-results"><p>NO RACES YET.<br><br>RACE DIRECTOR HASN'T<br>RUN A RACE!</p></div>`;
      return;
    }

    // Show newest first
    const reversed = [...results].reverse();
    reversed.forEach(race => {
      const block = document.createElement('div');
      block.className = 'race-block';
      let rowsHTML = '';
      race.order.forEach((entry, rank) => {
        const medal = rank < 3 ? medals[rank] : '&nbsp;';
        const topClass = rank < 3 ? topClasses[rank] : '';
        rowsHTML += `
          <div class="result-row ${topClass}">
            <span class="pos">P${entry.position}</span>
            <span class="medal">${medal}</span>
            <div class="driver-info">
              <div class="driver-ig">${entry.ig}</div>
              <div class="driver-num">${entry.num}</div>
            </div>
            <span class="pts-badge">+${entry.points} PTS</span>
          </div>`;
      });
      block.innerHTML = `
        <div class="race-header">
          <span class="race-title">🏁 RACE ${race.race}</span>
          <span class="race-date">${race.date}</span>
        </div>
        ${rowsHTML}`;
      container.appendChild(block);
    });
  }

  loadResults();
</script>
</body>
</html>
