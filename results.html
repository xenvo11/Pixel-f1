const medals=['🥇','🥈','🥉'];
const topCls=['top1','top2','top3'];

function render(){
  const results=JSON.parse(localStorage.getItem('gc_results')||'[]');
  const con=document.getElementById('resultsContainer');
  if(!results.length){
    con.innerHTML='<div class="no-results"><p>NO RACES YET.<br><br>CHECK BACK<br>AFTER RACE DAY!</p></div>';
    return;
  }
  const drivers=JSON.parse(localStorage.getItem('gc_drivers')||'[]');
  con.innerHTML='';
  [...results].reverse().forEach(race=>{
    const circ=CIRCUITS.find(c=>c.name===race.circuit)||{name:race.circuit||'UNKNOWN'};
    const flag=race.flag||'🏁';
    const block=document.createElement('div');
    block.className='race-block';
    let rows='';
    race.order.forEach((r,i)=>{
      const drv=drivers.find(d=>d.ig===r.ig)||{};
      const team=TEAMS[r.team||drv.team]||{color:'#888',name:'UNKNOWN'};
      rows+=`<div class="result-row ${topCls[i]||''}">
        <span class="pos">P${r.position}</span>
        ${i<3?`<span class="medal">${medals[i]}</span>`:'<span style="width:26px;flex-shrink:0"></span>'}
        <span class="team-dot" style="background:${team.color}"></span>
        <div class="driver-info">
          <div class="driver-ig">${r.ig}</div>
          <div class="driver-sub">${r.num} &middot; ${team.name}</div>
        </div>
        <span class="pts-badge">+${r.points}PTS</span>
      </div>`;
    });
    block.innerHTML=`
      <div class="race-header">
        <div class="race-header-left">
          <div class="race-title">RACE ${race.race}</div>
          <div class="race-circuit">${flag} ${race.circuit||'UNKNOWN'}</div>
          <div class="race-date">${race.date||''}</div>
        </div>
        <button class="replay-btn" onclick="openReplay(${race.race})">&#9654; WATCH REPLAY</button>
      </div>
      ${rows}`;
    con.appendChild(block);
  });
}

// ── REPLAY ENGINE ──
const rc=document.getElementById('replayCanvas');
const rx=rc.getContext('2d');
const RW=rc.width,RH=rc.height,RP=24;
const LAPS=3;
let rAnim=null,rRunning=false,rSpeed=1;
let rProg=[],rVel=[],rTrails=[],rDrivers=[],rCirc=null,rPts=[],rSL=[],rSA=[],rTL=0,rLT=0;

function buildRP(c){
  rPts=c.path.map(([nx,ny])=>({x:RP+nx*(RW-RP*2),y:RP+ny*(RH-RP*2)}));
  rSL=[];rSA=[];rTL=0;
  for(let i=0;i<rPts.length-1;i++){
    const dx=rPts[i+1].x-rPts[i].x,dy=rPts[i+1].y-rPts[i].y;
    const l=Math.sqrt(dx*dx+dy*dy);rSL.push(l);rTL+=l;rSA.push(Math.atan2(dy,dx));
  }
}

function getPA(t){
  t=((t%1)+1)%1;let d=t*rTL;
  for(let i=0;i<rSL.length;i++){
    if(d<=rSL[i]){
      const f=d/rSL[i],p1=rPts[i],p2=rPts[i+1];
      let a=rSA[i];
      if(i<rSA.length-1){let da=rSA[i+1]-a;while(da>Math.PI)da-=2*Math.PI;while(da<-Math.PI)da+=2*Math.PI;a+=da*f*.5;}
      return{x:p1.x+(p2.x-p1.x)*f,y:p1.y+(p2.y-p1.y)*f,a};
    }
    d-=rSL[i];
  }
  return{...rPts[0],a:rSA[0]};
}

function drawCar(cx,cy,angle,color,num){
  rx.save();rx.translate(cx,cy);rx.rotate(angle+Math.PI/2);
  const cl=16,cw=7;
  // Shadow
  rx.save();rx.translate(1,1);rx.fillStyle='rgba(0,0,0,0.5)';rx.beginPath();rx.ellipse(0,0,cw*.7,cl*.55,0,0,Math.PI*2);rx.fill();rx.restore();
  // Rear wing
  rx.fillStyle=color;rx.fillRect(-cw-2,-cl*.35,2,5);rx.fillRect(cw,-cl*.35,2,5);
  // Body
  rx.beginPath();rx.ellipse(0,0,cw*.75,cl*.52,0,0,Math.PI*2);rx.fillStyle=color;rx.fill();
  // Cockpit
  rx.beginPath();rx.ellipse(0,0,cw*.32,cl*.22,0,0,Math.PI*2);rx.fillStyle='rgba(0,0,0,0.75)';rx.fill();
  // Nose
  rx.beginPath();rx.moveTo(-cw*.25,-cl*.5);rx.lineTo(0,-cl*.75);rx.lineTo(cw*.25,-cl*.5);rx.closePath();rx.fillStyle=color;rx.fill();
  // Front wing
  rx.fillStyle=color;rx.fillRect(-cw-1,-cl*.65,cw*2+2,2.5);
  // Wheels
  [[cw*.78,-cl*.35],[-cw*.78,-cl*.35],[cw*.78,cl*.25],[-cw*.78,cl*.25]].forEach(([x,y])=>{
    rx.beginPath();rx.ellipse(x,y,2.5,3,0,0,Math.PI*2);rx.fillStyle='#111';rx.fill();rx.strokeStyle='#555';rx.lineWidth=.8;rx.stroke();
  });
  // Glow outline
  rx.beginPath();rx.ellipse(0,0,cw*.75,cl*.52,0,0,Math.PI*2);rx.strokeStyle='rgba(255,255,255,0.45)';rx.lineWidth=1;rx.stroke();
  // Number
  rx.fillStyle='rgba(255,255,255,0.9)';rx.font='bold 5px Arial';rx.textAlign='center';rx.textBaseline='middle';rx.fillText(num,0,2);
  rx.restore();
}

function drawScene(){
  rx.clearRect(0,0,RW,RH);
  rx.fillStyle='#0d1f0d';rx.fillRect(0,0,RW,RH);
  rx.strokeStyle='rgba(255,255,255,0.025)';rx.lineWidth=1;
  for(let x=0;x<RW;x+=40){rx.beginPath();rx.moveTo(x,0);rx.lineTo(x,RH);rx.stroke();}
  for(let y=0;y<RH;y+=40){rx.beginPath();rx.moveTo(0,y);rx.lineTo(RW,y);rx.stroke();}
  if(!rPts.length)return;
  function tl(w,s,d=[]){rx.beginPath();rx.moveTo(rPts[0].x,rPts[0].y);for(let i=1;i<rPts.length;i++)rx.lineTo(rPts[i].x,rPts[i].y);rx.closePath();rx.strokeStyle=s;rx.lineWidth=w;rx.lineJoin='round';rx.lineCap='round';rx.setLineDash(d);rx.stroke();rx.setLineDash([]);}
  tl(30,'rgba(0,80,0,0.25)');tl(24,'#1e1e1e');tl(20,'#252525');tl(1,'rgba(255,255,100,0.1)',[10,12]);tl(22,'rgba(255,255,255,0.06)');tl(14,'#1a1a1a');
  // Start/finish line
  const sf=rPts[0],sf2=rPts[1],ang=Math.atan2(sf2.y-sf.y,sf2.x-sf.x)+Math.PI/2;
  rx.save();rx.translate(sf.x,sf.y);rx.rotate(ang);
  for(let i=0;i<8;i++){rx.fillStyle=i%2===0?'#ff3333':'#fff';rx.fillRect(-13,i*3.5-14,13,3.5);rx.fillStyle=i%2===0?'#fff':'#ff3333';rx.fillRect(0,i*3.5-14,13,3.5);}
  rx.restore();
  // Trails
  rDrivers.forEach((d,i)=>{
    const trail=rTrails[i];if(!trail||trail.length<2)return;
    const col=(TEAMS[d.team]||{color:'#888'}).color;
    for(let t=trail.length-1;t>1;t--){
      const alpha=(t/trail.length)*.45,size=(t/trail.length)*3.5;
      rx.beginPath();rx.arc(trail[t].x,trail[t].y,size,0,Math.PI*2);
      rx.fillStyle=col+Math.floor(alpha*255).toString(16).padStart(2,'0');rx.fill();
    }
  });
  // Cars
  rDrivers.map((_,i)=>({i,p:rProg[i]})).sort((a,b)=>a.p-b.p).forEach(({i})=>{
    const t=(rProg[i]%1+1)%1,{x,y,a}=getPA(t);
    const col=(TEAMS[rDrivers[i].team]||{color:'#888'}).color;
    drawCar(x,y,a,col,rDrivers[i].num.replace('#',''));
  });
  // Watermark
  rx.fillStyle='rgba(255,255,255,0.02)';rx.font='bold '+Math.floor(RW/6)+'px Arial';
  rx.textAlign='center';rx.textBaseline='middle';rx.fillText(rCirc?rCirc.name:'',RW/2,RH/2);
}

function replayLoop(ts){
  if(!rRunning)return;
  const delta=Math.min(ts-rLT,80)*rSpeed;rLT=ts;
  rDrivers.forEach((_,i)=>{
    if(rProg[i]>=LAPS)return;
    rProg[i]=Math.min(LAPS,rProg[i]+(rVel[i]*delta)/7500);
    const t=(rProg[i]%1+1)%1,pos=getPA(t);
    rTrails[i].push({x:pos.x,y:pos.y});if(rTrails[i].length>28)rTrails[i].shift();
  });
  const maxP=Math.max(...rDrivers.map((_,i)=>rProg[i]));
  document.getElementById('replayLap').textContent='LAP '+Math.min(Math.ceil(maxP),LAPS)+' / '+LAPS;
  document.getElementById('progressFill').style.width=(maxP/LAPS*100)+'%';
  if(Math.random()>.97){const i=Math.floor(Math.random()*rDrivers.length);rVel[i]=Math.random()>.5?1.8+Math.random()*1.2:.4+Math.random()*.6;}
  drawScene();
  if(Math.min(...rDrivers.map((_,i)=>rProg[i]))>=LAPS-.02){rRunning=false;document.getElementById('replayInfo').textContent='RACE COMPLETE — HIT RESTART TO WATCH AGAIN';return;}
  rAnim=requestAnimationFrame(replayLoop);
}

let currentReplayRace=null;
function openReplay(raceNum){
  const results=JSON.parse(localStorage.getItem('gc_results')||'[]');
  const race=results.find(r=>r.race===raceNum);if(!race)return;
  currentReplayRace=raceNum;
  rCirc=CIRCUITS.find(c=>c.name===race.circuit)||CIRCUITS[0];
  buildRP(rCirc);
  rDrivers=race.order.map(r=>({num:r.num,ig:r.ig,team:r.team}));
  rProg=rDrivers.map(()=>0);
  // Seed velocities so winner tends to be fast but with randomness
  rVel=rDrivers.map((_,i)=>(1.15-(i*.035))*(0.82+Math.random()*.36));
  rTrails=rDrivers.map(()=>[]);
  rSpeed=1;
  document.getElementById('speedBtn').textContent='2X SPEED';
  document.getElementById('replayTitleTxt').textContent='RACE '+raceNum+' REPLAY  '+( race.flag||'')+' '+race.circuit;
  document.getElementById('replayInfo').textContent=(race.flag||'')+'  '+race.circuit+'  —  3 LAPS';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('replayLap').textContent='LAP 0 / 3';
  // Leaderboard
  const lb=document.getElementById('replayLB');lb.innerHTML='';
  race.order.forEach((r,rank)=>{
    const team=TEAMS[r.team]||{color:'#888'};
    const row=document.createElement('div');row.className='rlb-row'+(rank===0?' p1':'');
    row.innerHTML='<span class="rlb-pos">P'+(rank+1)+'</span><span class="rlb-dot" style="background:'+team.color+'"></span><span class="rlb-name">'+r.ig+'</span><span class="rlb-pts">+'+r.points+'</span>';
    lb.appendChild(row);
  });
  document.getElementById('replayOverlay').classList.add('show');
  cancelAnimationFrame(rAnim);rRunning=true;rLT=performance.now();
  rAnim=requestAnimationFrame(replayLoop);
}

function closeReplay(){cancelAnimationFrame(rAnim);rRunning=false;document.getElementById('replayOverlay').classList.remove('show');}
function restartReplay(){cancelAnimationFrame(rAnim);rRunning=false;openReplay(currentReplayRace);}
function toggleSpeed(){rSpeed=rSpeed===1?2:1;document.getElementById('speedBtn').textContent=rSpeed===2?'1X SPEED':'2X SPEED';}

render();
</script>
