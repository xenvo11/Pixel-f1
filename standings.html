<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GRID CHAOS — CHAMPIONSHIP STANDINGS</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet"/>
  <style>
    :root { --red:#ff2b2b; --yellow:#ffe600; --green:#00ff6a; --white:#f5f5f5; --black:#0a0a0a; --grey:#1a1a1a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--black); color:var(--white); font-family:'VT323',monospace; font-size:20px; min-height:100vh; }
    body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px); pointer-events:none; z-index:999; }
    header { text-align:center; padding:30px 20px 20px; border-bottom:4px solid var(--yellow); }
    header h1 { font-family:'Press Start 2P',monospace; font-size:clamp(14px,3vw,26px); color:var(--yellow); text-shadow:4px 4px 0 var(--red); }
    .subtitle { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--red); margin-top:10px; }
    .nav-links { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; padding:20px; }
    .nav-link { font-family:'Press Start 2P',monospace; font-size:9px; padding:10px 16px; background:var(--grey); color:var(--yellow); text-decoration:none; border:3px solid var(--yellow); }
    .nav-link:hover { background:var(--yellow); color:var(--black); }
    .content { max-width:700px; margin:0 auto; padding:20px; }
    .section-title { font-family:'Press Start 2P',monospace; font-size:clamp(12px,2.5vw,20px); color:var(--yellow); text-align:center; margin-bottom:30px; }
    .section-title::after { content:''; display:block; width:60px; height:4px; background:var(--red); margin:12px auto 0; }
    .races-info { font-family:'Press Start 2P',monospace; font-size:9px; color:#555; text-align:center; margin-bottom:24px; }
    .standing-row {
      display:flex;
      align-items:center;
      gap:14px;
      padding:14px 20px;
      margin-bottom:8px;
      background:var(--grey);
      border-left:4px solid #333;
      position:relative;
      overflow:hidden;
    }
    .standing-row.rank1 { border-left-color:var(--yellow); background:rgba(255,230,0,0.08); }
    .standing-row.rank2 { border-left-color:#aaa; background:rgba(170,170,170,0.05); }
    .standing-row.rank3 { border-left-color:#cd7f32; background:rgba(205,127,50,0.05); }
    .bar-bg {
      position:absolute;
      left:0; top:0; bottom:0;
      background:rgba(255,230,0,0.04);
      transition:width 1s ease;
    }
    .rank-num { font-family:'Press Start 2P',monospace; font-size:14px; width:36px; flex-shrink:0; position:relative; z-index:1; }
    .rank1 .rank-num { color:var(--yellow); }
    .rank2 .rank-num { color:#aaa; }
    .rank3 .rank-num { color:#cd7f32; }
    .rank-medal { font-size:22px; width:28px; flex-shrink:0; position:relative; z-index:1; }
    .driver-info { flex:1; position:relative; z-index:1; }
    .driver-ig { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--white); }
    .driver-num-s { font-size:17px; color:#666; }
    .points-total { font-family:'Press Start 2P',monospace; font-size:16px; color:var(--yellow); position:relative; z-index:1; }
    .no-results { text-align:center; padding:60px 20px; }
    .no-results p { font-family:'Press Start 2P',monospace; font-size:11px; color:#444; line-height:2.2; }
    .leader-gap { font-size:16px; color:#555; margin-top:4px; }
    .trophy-header { font-size:60px; text-align:center; margin-bottom:16px; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  </style>
</head>
<body>
<header>
  <h1>🏆 CHAMPIONSHIP</h1>
  <p class="subtitle">GRID CHAOS — SEASON 1 STANDINGS</p>
</header>
<div class="nav-links">
  <a href="results.html" class="nav-link">📋 RACE RESULTS</a>
  <a href="index.html" class="nav-link">🏠 HOME</a>
</div>
<div class="content">
  <h2 class="section-title">// DRIVER STANDINGS</h2>
  <p class="races-info" id="racesInfo">LOADING...</p>
  <div id="standingsContainer"></div>
</div>
<script>
  const medals = ['🥇','🥈','🥉'];
  const rankClasses = ['rank1','rank2','rank3'];

  function loadStandings() {
    const standings = JSON.parse(localStorage.getItem('gc_standings') || '{}');
    const results = JSON.parse(localStorage.getItem('gc_results') || '[]');
    const drivers = JSON.parse(localStorage.getItem('gc_drivers') || '[]');
    const container = document.getElementById('standingsContainer');

    document.getElementById('racesInfo').textContent = `RACES COMPLETED: ${results.length}`;

    if (Object.keys(standings).length === 0) {
      container.innerHTML = `<div class="no-results"><p>NO STANDINGS YET.<br><br>WAITING FOR THE<br>FIRST RACE! 🏁</p></div>`;
      return;
    }

    // Sort by points
    const sorted = Object.entries(standings).sort((a,b) => b[1]-a[1]);
    const maxPts = sorted[0][1];

    if (sorted.length > 0) {
      document.querySelector('.content').insertAdjacentHTML('afterbegin', '<div class="trophy-header">🏆</div>');
    }

    sorted.forEach(([ig, pts], rank) => {
      // Find driver info
      const driver = drivers.find(d => d.ig === ig) || { num: '—', name: ig };
      const rankClass = rank < 3 ? rankClasses[rank] : '';
      const medal = rank < 3 ? medals[rank] : '';
      const barWidth = Math.round((pts / maxPts) * 100);
      const gap = rank === 0 ? 'LEADER' : `-${maxPts - pts} PTS`;

      const row = document.createElement('div');
      row.className = `standing-row ${rankClass}`;
      row.innerHTML = `
        <div class="bar-bg" style="width:${barWidth}%"></div>
        <span class="rank-num">${rank+1}</span>
        <span class="rank-medal">${medal}</span>
        <div class="driver-info">
          <div class="driver-ig">${ig}</div>
          <div class="driver-num-s">${driver.num} · <span style="color:${rank===0?'var(--green)':'#555'}">${gap}</span></div>
        </div>
        <span class="points-total">${pts}<span style="font-size:13px;color:#666"> PTS</span></span>`;
      container.appendChild(row);
    });
  }

  loadStandings();
</script>
</body>
</html>
